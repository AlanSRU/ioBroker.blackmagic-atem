# Dependabot will run on day 7 of each month at 01:37 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      cronjob: '17 6 8 * *'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      cronjob: '42 9 22 * *'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    cooldown:
      default-days: 7
